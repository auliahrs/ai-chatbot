<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="chat-shell">
            <div class="chat-header">
                <div>
                    <p class="eyebrow">Always online</p>
                    <h1>AI Customer Support Chatbot</h1>
                    <p class="subtitle">Ask a support question and get an instant answer.</p>
                </div>
            </div>

            <div class="chat-box" id="chatBox"></div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your question here..." />
                <button type="button" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById("chatBox");
            const roleLabel = role === "user" ? "You" : "Bot";

            chatBox.innerHTML += `
                <div class="message-row ${role}">
                    <div class="message-meta">${roleLabel}</div>
                    <div class="message-bubble">${escapeHtml(text)}</div>
                </div>
            `;

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value.trim();

            if (!message) return;

            appendMessage("user", message);
            input.value = "";

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                appendMessage("bot", data.reply);
            } catch (error) {
                appendMessage("bot", "Error sending message.");
            }
        }

        document.getElementById("userInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
